<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioX Folder Player v2.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }
    </style>

    <script>
        function app() {
            return {
                tabAtual: 'player', 
                audio: null,
                
                // Variáveis da Web Audio API (Equalizador Real)
                audioContext: null,
                analyser: null,
                dataArray: null,
                source: null,
                barHeights: [10, 10, 10, 10, 10, 10, 10],
                
                // Estados do Player
                isPlaying: false,
                currentTime: 0,
                duration: 0,
                volume: 0.8,
                isMuted: false,
                isShuffle: false,
                isLoop: false,
                dispositivoAtual: 'Saída Padrão do Sistema', // Novo Estado
                
                // Smart Shuffle (Fila e Histórico)
                filaShuffle: [],
                historicoMusicas: [],
                
                // Biblioteca e Pesquisa
                biblioteca: [],
                termoPesquisa: '',
                
                // Playlists e Estados de Organização
                playlists: [],
                playlistAtiva: null, 
                musicaAtualIdx: 0,
                novaPlaylistNome: '',
                
                iniciar() {
                    this.audio = new Audio();
                    this.audio.crossOrigin = "anonymous"; 
                    this.audio.volume = this.volume;

                    // Recupera playlists do LocalStorage
                    const salvas = localStorage.getItem('audiox-folder-playlists');
                    if (salvas) {
                        this.playlists = JSON.parse(salvas);
                    } else {
                        this.playlists = [{ id: 'fav', nome: 'Minhas Favoritas', icon: 'fa-heart', musicasIds: [] }];
                        this.salvarNoNavegador();
                    }

                    // Ouvintes de Eventos do Áudio
                    this.audio.addEventListener('timeupdate', () => { this.currentTime = this.audio.currentTime; });
                    this.audio.addEventListener('loadedmetadata', () => { this.duration = this.audio.duration; });
                    this.audio.addEventListener('ended', () => { this.proximaMusica(true); });
                },

                setupAudioContext() {
                    if (!this.audioContext) {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        this.analyser = this.audioContext.createAnalyser();
                        
                        this.source = this.audioContext.createMediaElementSource(this.audio);
                        this.source.connect(this.analyser);
                        this.analyser.connect(this.audioContext.destination);
                        
                        this.analyser.fftSize = 64; 
                        const bufferLength = this.analyser.frequencyBinCount;
                        this.dataArray = new Uint8Array(bufferLength);
                        
                        this.renderEqualizer();
                    }
                },

                renderEqualizer() {
                    if (!this.isPlaying) {
                        this.barHeights = this.barHeights.map(h => Math.max(10, h - 4));
                        requestAnimationFrame(() => this.renderEqualizer());
                        return;
                    }

                    this.analyser.getByteFrequencyData(this.dataArray);
                    const indicesIndices = [2, 4, 6, 9, 12, 15, 19]; 
                    
                    this.barHeights = indicesIndices.map(idx => {
                        const valorBruto = this.dataArray[idx] || 0;
                        const porcentagem = (valorBruto / 255) * 100;
                        return Math.max(10, porcentagem); 
                    });

                    requestAnimationFrame(() => this.renderEqualizer());
                },

                // --- IMPORTAR PASTA COM RECUPERAÇÃO DE ÚLTIMA MÚSICA ---
                async selecionarPasta() {
                    try {
                        const dirHandle = await window.showDirectoryPicker();
                        this.biblioteca = [];
                        let idCounter = 1;

                        for await (const entry of dirHandle.values()) {
                            if (entry.kind === 'file' && /\.(mp3|wav|m4a|ogg)$/i.test(entry.name)) {
                                const file = await entry.getFile();
                                const blobUrl = URL.createObjectURL(file);
                                const nomeLimpo = entry.name.replace(/\.[^/.]+$/, "");

                                this.biblioteca.push({
                                    id: idCounter.toString(),
                                    titulo: nomeLimpo,
                                    artista: "Arquivo Local",
                                    album: "Sua Pasta",
                                    url: blobUrl
                                });
                                idCounter++;
                            }
                        }

                        if (this.biblioteca.length > 0) {
                            // Verifica se existe uma última música tocada salva
                            const ultimaTocada = localStorage.getItem('audiox-ultima-musica');
                            let indexParaTocar = 0;
                            
                            if (ultimaTocada) {
                                const idxEncontrado = this.biblioteca.findIndex(m => m.titulo === ultimaTocada);
                                if (idxEncontrado !== -1) {
                                    indexParaTocar = idxEncontrado;
                                }
                            }
                            
                            this.musicaAtualIdx = indexParaTocar;
                            this.filaShuffle = []; // Reseta a fila ao carregar nova pasta
                            this.historicoMusicas = [];
                            this.carregarMusica();
                        } else {
                            alert("Nenhum arquivo de áudio compatível foi encontrado na pasta selecionada.");
                        }

                    } catch (err) {
                        console.error("Acesso à pasta cancelado ou não suportado:", err);
                    }
                },

                // --- TROCAR SAÍDA DE ÁUDIO ---
                async trocarSaidaAudio() {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.selectAudioOutput) {
                        alert("Seu navegador não suporta a troca de dispositivo de saída de áudio nativamente (Recomendado: Chrome ou Edge atualizados).");
                        return;
                    }

                    try {
                        // Abre o pop-up nativo do navegador para o usuário escolher o dispositivo Bluetooth/Monitor/Caixa de Som
                        const device = await navigator.mediaDevices.selectAudioOutput();
                        
                        // Atualiza no elemento de áudio básico
                        if (typeof this.audio.setSinkId === 'function') {
                            await this.audio.setSinkId(device.deviceId);
                        }
                        
                        // Atualiza na Web Audio API (o motor do nosso equalizador visual)
                        if (this.audioContext && typeof this.audioContext.setSinkId === 'function') {
                            await this.audioContext.setSinkId(device.deviceId);
                        }

                        // Se o dispositivo tiver nome vazio, chamamos de 'Dispositivo Personalizado'
                        this.dispositivoAtual = device.label || 'Dispositivo Selecionado';
                        
                    } catch (err) {
                        console.error("Seleção de dispositivo de áudio cancelada ou falhou:", err);
                    }
                },

                // --- GETTERS ---
                get listaAtual() {
                    if (!this.playlistAtiva) return this.biblioteca;
                    const pl = this.playlists.find(p => p.id === this.playlistAtiva);
                    if (!pl) return this.biblioteca;
                    return this.biblioteca.filter(m => pl.musicasIds.includes(m.id));
                },

                get musicaAtual() {
                    return this.listaAtual[this.musicaAtualIdx] || null;
                },

                get bibliotecaFiltrada() {
                    if (!this.termoPesquisa.trim()) return this.biblioteca;
                    const termo = this.termoPesquisa.toLowerCase();
                    return this.biblioteca.filter(m => m.titulo.toLowerCase().includes(termo));
                },

                // --- CONTROLES DE ÁUDIO ---
                carregarMusica() {
                    if (this.musicaAtual) {
                        // Salva a música atual no LocalStorage
                        localStorage.setItem('audiox-ultima-musica', this.musicaAtual.titulo);

                        const tocandoAgora = this.isPlaying;
                        this.audio.src = this.musicaAtual.url;
                        this.audio.load();
                        if (tocandoAgora) this.audio.play().catch(() => this.isPlaying = false);
                    }
                },

                togglePlay() {
                    if (!this.musicaAtual) return;
                    this.setupAudioContext();
                    
                    if (this.isPlaying) {
                        this.audio.pause();
                        this.isPlaying = false;
                    } else {
                        if (this.audioContext && this.audioContext.state === 'suspended') {
                            this.audioContext.resume();
                        }
                        this.audio.play().then(() => { 
                            this.isPlaying = true; 
                            this.renderEqualizer(); 
                        }).catch(() => {});
                    }
                },

                tocarMusicaDireto(musicaId, playlistId = null) {
                    this.playlistAtiva = playlistId;
                    const index = this.listaAtual.findIndex(m => m.id === musicaId);
                    if (index !== -1) {
                        this.historicoMusicas.push(this.musicaAtualIdx);
                        this.filaShuffle = []; 
                        
                        this.musicaAtualIdx = index;
                        this.isPlaying = true;
                        this.setupAudioContext();
                        this.carregarMusica();
                        if (this.audioContext && this.audioContext.state === 'suspended') {
                            this.audioContext.resume();
                        }
                        this.audio.play().then(() => { this.renderEqualizer(); }).catch(() => {});
                        this.tabAtual = 'player';
                    }
                },

                // --- SMART SHUFFLE E NAVEGAÇÃO ---
                alternarShuffle() {
                    this.isShuffle = !this.isShuffle;
                    if (this.isShuffle) {
                        this.filaShuffle = []; 
                    }
                },

                gerarFilaShuffle() {
                    let indices = this.listaAtual.map((_, i) => i);
                    indices = indices.filter(i => i !== this.musicaAtualIdx);
                    // Fisher-Yates Shuffle
                    for (let i = indices.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [indices[i], indices[j]] = [indices[j], indices[i]];
                    }
                    this.filaShuffle = indices;
                },

                proximaMusica(automatica = false) {
                    if (this.listaAtual.length === 0) return;
                    
                    if (automatica && this.isLoop) {
                        this.audio.currentTime = 0;
                        this.audio.play().catch(() => {});
                        return;
                    }

                    this.historicoMusicas.push(this.musicaAtualIdx);

                    if (this.isShuffle && this.listaAtual.length > 1) {
                        if (this.filaShuffle.length === 0) {
                            this.gerarFilaShuffle();
                        }
                        this.musicaAtualIdx = this.filaShuffle.pop();
                    } else {
                        this.musicaAtualIdx = (this.musicaAtualIdx + 1) % this.listaAtual.length;
                    }
                    
                    this.carregarMusica();
                    if (this.isPlaying) this.audio.play().catch(() => {});
                },

                musicaAnterior() {
                    if (this.listaAtual.length === 0) return;

                    if (this.historicoMusicas.length > 0) {
                        if (this.isShuffle) {
                            this.filaShuffle.push(this.musicaAtualIdx);
                        }
                        this.musicaAtualIdx = this.historicoMusicas.pop();
                    } else {
                        this.musicaAtualIdx = (this.musicaAtualIdx - 1 + this.listaAtual.length) % this.listaAtual.length;
                    }
                    
                    this.carregarMusica();
                    if (this.isPlaying) this.audio.play().catch(() => {});
                },

                // --- PROGRESSO E VOLUME ---
                avancarProgresso(e) {
                    if (!this.duration) return;
                    const barra = e.currentTarget;
                    this.audio.currentTime = (e.offsetX / barra.offsetWidth) * this.duration;
                },

                ajustarVolume() { this.audio.volume = this.volume; this.isMuted = this.volume === 0; },
                toggleMute() { this.isMuted = !this.isMuted; this.audio.muted = this.isMuted; },

                // --- GERENCIADOR DE PLAYLISTS ---
                criarPlaylist() {
                    if (!this.novaPlaylistNome.trim()) return;
                    this.playlists.push({ id: Date.now().toString(), nome: this.novaPlaylistNome.trim(), icon: 'fa-music', musicasIds: [] });
                    this.novaPlaylistNome = '';
                    this.salvarNoNavegador();
                },

                removerPlaylist(id) {
                    this.playlists = this.playlists.filter(p => p.id !== id);
                    if (this.playlistAtiva === id) this.playlistAtiva = null;
                    this.salvarNoNavegador();
                },

                toggleMusicaNaPlaylist(playlistId, musicaId) {
                    const pl = this.playlists.find(p => p.id === playlistId);
                    if (pl) {
                        const idx = pl.musicasIds.indexOf(musicaId);
                        if (idx === -1) pl.musicasIds.push(musicaId);
                        else pl.musicasIds.splice(idx, 1);
                        this.salvarNoNavegador();
                    }
                },

                isMusicaNaPlaylist(playlistId, musicaId) {
                    const pl = this.playlists.find(p => p.id === playlistId);
                    return pl ? pl.musicasIds.includes(musicaId) : false;
                },

                salvarNoNavegador() { localStorage.setItem('audiox-folder-playlists', JSON.stringify(this.playlists)); },
                
                formatarTempo(segundos) {
                    if (isNaN(segundos)) return "0:00";
                    const mins = Math.floor(segundos / 60);
                    const segs = Math.floor(segundos % 60);
                    return `${mins}:${segs < 10 ? '0' : ''}${segs}`;
                }
            }
        }
    </script>
</head>
<body class="flex justify-center min-h-screen p-4 select-none">

    <div x-data="app()" x-init="iniciar()" x-cloak class="w-full max-w-md space-y-4 pb-24 relative flex flex-col justify-between">
        
        <div class="text-center py-2 border-b border-gray-800 flex justify-between items-center">
            <h1 class="text-lg font-black text-white tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-waveform-lines text-blue-500"></i> AudioX v2.2
            </h1>
            <button @click="selecionarPasta()" class="text-[10px] bg-blue-600 hover:bg-blue-500 text-white font-bold py-1.5 px-3 rounded-lg border border-blue-500/30 transition flex items-center gap-1.5 shadow-md">
                <i class="fa-solid fa-folder-plus"></i> Abrir Pasta
            </button>
        </div>

        <div x-show="tabAtual === 'player'" class="space-y-6 flex-1 flex flex-col justify-center py-4">
            <div class="flex justify-center my-6">
                <div class="w-64 h-48 bg-slate-900/40 border border-slate-800/80 rounded-2xl flex items-end justify-center gap-3 p-6 shadow-inner relative overflow-hidden group">
                    <div :class="isPlaying ? 'opacity-20' : 'opacity-0'" class="absolute inset-0 bg-blue-500 blur-3xl transition-opacity duration-500 pointer-events-none"></div>
                    <div :style="`height: ${barHeights[0]}%`" :class="isPlaying ? 'bg-blue-500 shadow-[0_0_12px_#3b82f6]' : 'bg-slate-700'" class="w-3 rounded-full transition-all duration-75"></div>
                    <div :style="`height: ${barHeights[1]}%`" :class="isPlaying ? 'bg-blue-400 shadow-[0_0_12px_#60a5fa]' : 'bg-slate-700'" class="w-3 rounded-full transition-all duration-75"></div>
                    <div :style="`height: ${barHeights[2]}%`" :class="isPlaying ? 'bg-cyan-400 shadow-[0_0_12px_#22d3ee]' : 'bg-slate-700'" class="w-3 rounded-full transition-all duration-75"></div>
                    <div :style="`height: ${barHeights[3]}%`" :class="isPlaying ? 'bg-emerald-400 shadow-[0_0_12px_#34d399]' : 'bg-slate-700'" class="w-3 rounded-full transition-all duration-75"></div>
                    <div :style="`height: ${barHeights[4]}%`" :class="isPlaying ? 'bg-cyan-400 shadow-[0_0_12px_#22d3ee]' : 'bg-slate-700'" class="w-3 rounded-full transition-all duration-75"></div>
                    <div :style="`height: ${barHeights[5]}%`" :class="isPlaying ? 'bg-blue-400 shadow-[0_0_12px_#60a5fa]' : 'bg-slate-700'" class="w-3 rounded-full transition-all duration-75"></div>
                    <div :style="`height: ${barHeights[6]}%`" :class="isPlaying ? 'bg-blue-500 shadow-[0_0_12px_#3b82f6]' : 'bg-slate-700'" class="w-3 rounded-full transition-all duration-75"></div>
                </div>
            </div>

            <div class="text-center space-y-1">
                <h2 class="text-lg font-black text-white tracking-wide truncate px-4" x-text="musicaAtual ? musicaAtual.titulo : 'Nenhuma pasta aberta'"></h2>
                <p class="text-xs text-blue-400 font-medium truncate" x-text="musicaAtual ? musicaAtual.album : 'Clique em Abrir Pasta acima'"></p>
            </div>

            <div class="space-y-1 px-2">
                <div @click="avancarProgresso($event)" class="w-full h-1.5 bg-gray-800 rounded-full cursor-pointer relative overflow-hidden group">
                    <div class="h-full bg-blue-500 rounded-full transition-all duration-100" :style="`width: ${duration ? (currentTime / duration) * 100 : 0}%`"></div>
                </div>
                <div class="flex justify-between text-[10px] font-mono text-gray-500">
                    <span x-text="formatarTempo(currentTime)">0:00</span>
                    <span x-text="formatarTempo(duration)">0:00</span>
                </div>
            </div>

            <div class="flex items-center justify-center gap-6">
                <button @click="alternarShuffle()" :class="isShuffle ? 'text-blue-400 drop-shadow-[0_0_5px_#3b82f6]' : 'text-gray-500 hover:text-white'" class="transition text-sm relative">
                    <i class="fa-solid fa-shuffle"></i>
                    <span x-show="isShuffle" class="absolute -top-2 -right-2 text-[8px] bg-blue-600 text-white rounded-full w-3 h-3 flex items-center justify-center">S</span>
                </button>
                <button @click="musicaAnterior()" class="text-gray-400 hover:text-white transition text-xl active:scale-95"><i class="fa-solid fa-backward-step"></i></button>
                <button @click="togglePlay()" class="w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center text-2xl hover:bg-blue-500 transition active:scale-95 shadow-lg shadow-blue-600/20">
                    <i class="fa-solid" :class="isPlaying ? 'fa-pause' : 'fa-play pl-1'"></i>
                </button>
                <button @click="proximaMusica()" class="text-gray-400 hover:text-white transition text-xl active:scale-95"><i class="fa-solid fa-forward-step"></i></button>
                <button @click="isLoop = !isLoop" :class="isLoop ? 'text-blue-400 drop-shadow-[0_0_5px_#3b82f6]' : 'text-gray-500 hover:text-white'" class="transition text-sm relative">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span x-show="isLoop" class="absolute -top-2 -right-2 text-[8px] bg-blue-600 text-white rounded-full w-3 h-3 flex items-center justify-center">1</span>
                </button>
            </div>

            <div class="flex items-center gap-3 px-6 bg-gray-900/40 p-3 rounded-xl border border-gray-800/60">
                <button @click="toggleMute()" class="text-gray-500 hover:text-white transition w-5">
                    <i class="fa-solid" :class="isMuted ? 'fa-volume-xmark text-red-400' : (volume > 0.5 ? 'fa-volume-high' : 'fa-volume-low')"></i>
                </button>
                <input type="range" min="0" max="1" step="0.05" x-model="volume" @input="ajustarVolume()" class="flex-1 h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>

            <div class="flex justify-center mt-2">
                <button @click="trocarSaidaAudio()" title="Escolher saída de áudio (Bluetooth, Fones, etc)" class="text-[10px] bg-gray-800/50 hover:bg-gray-700 text-gray-400 py-1.5 px-4 rounded-full border border-gray-700/50 transition flex items-center gap-2 max-w-[200px]">
                    <i class="fa-solid fa-headphones"></i>
                    <span class="truncate" x-text="dispositivoAtual"></span>
                </button>
            </div>
        </div>

        <div x-show="tabAtual === 'playlists'" class="space-y-4 flex-1">
            <div class="bg-gray-900 p-3 rounded-xl border border-gray-800 flex gap-2">
                <input x-model="novaPlaylistNome" @keydown.enter="criarPlaylist()" type="text" placeholder="Nome da nova playlist..." class="flex-1 bg-gray-950 text-white px-3 py-2 rounded-lg border border-gray-800 focus:border-blue-500 outline-none text-xs font-bold placeholder-gray-600">
                <button @click="criarPlaylist()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg text-xs font-bold transition">Criar</button>
            </div>

            <div class="space-y-2 max-h-[400px] overflow-y-auto custom-scroll pr-1">
                <div @click="playlistAtiva = null; tabAtual = 'player'" :class="playlistAtiva === null ? 'border-blue-500/50 bg-blue-500/5' : 'border-gray-800'" class="p-3 bg-gray-900 rounded-xl border flex justify-between items-center cursor-pointer hover:border-gray-700 transition">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-500/10 text-blue-400 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-list-music"></i></div>
                        <div>
                            <h4 class="text-xs font-bold text-white">Todas as Músicas Escaneadas</h4>
                            <p class="text-[10px] text-gray-500 font-mono" x-text="biblioteca.length + ' faixas encontradas'"></p>
                        </div>
                    </div>
                </div>

                <template x-for="p in playlists" :key="p.id">
                    <div @click="playlistAtiva = p.id; tabAtual = 'player'" :class="playlistAtiva === p.id ? 'border-blue-500/50 bg-blue-500/5' : 'border-gray-800'" class="p-3 bg-gray-900 rounded-xl border flex justify-between items-center cursor-pointer hover:border-gray-700 transition relative group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-purple-500/10 text-purple-400 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid" :class="p.icon"></i></div>
                            <div>
                                <h4 class="text-xs font-bold text-white" x-text="p.nome"></h4>
                                <p class="text-[10px] text-gray-500 font-mono" x-text="p.musicasIds.length + ' faixas vinculadas'"></p>
                            </div>
                        </div>
                        <button x-show="p.id !== 'fav'" @click.stop="removerPlaylist(p.id)" class="text-gray-600 hover:text-red-400 p-1 text-xs transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="tabAtual === 'biblioteca'" class="space-y-3 flex-1 flex flex-col">
            <div class="relative bg-gray-900 rounded-xl border border-gray-800 flex items-center overflow-hidden">
                <div class="pl-3 text-gray-500"><i class="fa-solid fa-magnifying-glass text-xs"></i></div>
                <input x-model="termoPesquisa" type="text" placeholder="Buscar música por nome..." class="w-full bg-transparent text-white px-3 py-3 outline-none text-xs font-bold placeholder-gray-600">
                <button x-show="termoPesquisa" @click="termoPesquisa = ''" class="pr-3 text-gray-500 hover:text-white transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div x-show="biblioteca.length === 0" class="text-center py-12 text-gray-600 italic text-sm mt-4">
                <i class="fa-solid fa-folder-closed text-2xl mb-2 block"></i>
                Nenhuma música importada.
            </div>

            <div x-show="biblioteca.length > 0 && bibliotecaFiltrada.length === 0" class="text-center py-6 text-gray-500 text-xs">
                Nenhum resultado encontrado para "<span x-text="termoPesquisa" class="text-white font-bold"></span>".
            </div>

            <div class="space-y-2 flex-1 overflow-y-auto custom-scroll pr-1 pb-4">
                <template x-for="m in bibliotecaFiltrada" :key="m.id">
                    <div class="bg-gray-900 p-2.5 rounded-xl border border-gray-800/60 flex items-center justify-between gap-3">
                        <div @click="tocarMusicaDireto(m.id)" class="flex items-center gap-3 flex-1 min-w-0 cursor-pointer group">
                            <div class="w-8 h-8 bg-gray-800 rounded flex items-center justify-center text-xs text-blue-400 group-hover:bg-blue-600/20"><i class="fa-solid fa-music"></i></div>
                            <div class="min-w-0">
                                <h4 class="text-xs font-bold text-white truncate group-hover:text-blue-400 transition" x-text="m.titulo"></h4>
                            </div>
                        </div>

                        <div class="flex items-center gap-1.5 shrink-0">
                            <template x-for="p in playlists" :key="p.id">
                                <button @click="toggleMusicaNaPlaylist(p.id, m.id)" 
                                        :title="'Adicionar a ' + p.nome"
                                        :class="isMusicaNaPlaylist(p.id, m.id) ? 'bg-blue-600/20 text-blue-400 border-blue-500/40' : 'bg-gray-950 text-gray-600 border-gray-800'"
                                        class="w-6 h-6 rounded border text-[10px] flex items-center justify-center transition active:scale-90">
                                    <i class="fa-solid" :class="p.id === 'fav' ? 'fa-heart' : 'fa-plus'"></i>
                                </button>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-3 bg-gray-950/90 backdrop-blur-md border-t border-gray-900 flex justify-center z-40">
            <div class="w-full max-w-md flex bg-gray-900 p-1 rounded-xl border border-gray-800">
                <button @click="tabAtual = 'player'" :class="tabAtual === 'player' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-400 hover:text-white'" class="flex-1 py-2 rounded-lg text-xs font-bold transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-compact-disc"></i> Player
                </button>
                <button @click="tabAtual = 'playlists'" :class="tabAtual === 'playlists' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-400 hover:text-white'" class="flex-1 py-2 rounded-lg text-xs font-bold transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-folder-music"></i> Playlists
                </button>
                <button @click="tabAtual = 'biblioteca'" :class="tabAtual === 'biblioteca' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-400 hover:text-white'" class="flex-1 py-2 rounded-lg text-xs font-bold transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-sliders"></i> Organizar
                </button>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
